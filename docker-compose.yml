services:
  fastcode:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: fastcode-mcp
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "5555:5555"
    volumes:
      # Map your entire workspace here. Everything inside becomes 'scoutable'.
      - ~/workspace:/app/repos:ro
      - ./fastcode_data:/app/data
    env_file:
      - .env
    environment:
      - HF_HOME=/app/data/hf-cache
      - HUGGINGFACE_HUB_CACHE=/app/data/hf-cache/hub
      - TRANSFORMERS_CACHE=/app/data/hf-cache/transformers
      - SENTENCE_TRANSFORMERS_HOME=/app/data/hf-cache/sentence-transformers
    networks:
      - opencode-net
    restart: unless-stopped

networks:
  opencode-net:
    name: opencode-mcp-servers_opencode-net
    external: true
